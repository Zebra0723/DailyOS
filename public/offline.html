<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · DailyOS</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f7f2e9;
        color: #1c1a17;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #17130f; color: #f3ece1; }
        .card { background: #201b15 !important; border-color: #3a322a !important; }
        .muted { color: #a99f92 !important; }
      }
      .card {
        width: 100%;
        max-width: 360px;
        text-align: center;
        background: #fff;
        border: 1px solid #e6ddd0;
        border-radius: 20px;
        padding: 32px 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
      }
      .mark {
        width: 56px; height: 56px; margin: 0 auto 16px;
        display: grid; place-items: center;
        border-radius: 16px; background: rgba(191, 80, 43, 0.12); color: #bf502b;
        font-size: 26px;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p.muted { color: #5b544b; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #bf502b; color: #fff;
        font-size: 15px; font-weight: 600;
        padding: 12px 22px; border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">◐</div>
      <h1>You're offline</h1>
      <p class="muted">
        You haven't opened this page yet, so there's nothing saved to show. Pages
        you've already visited still work offline — and your data is safe.
        Reconnect and try again.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
