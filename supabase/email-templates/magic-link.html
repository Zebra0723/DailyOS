<!-- DailyOS — Magic Link (passwordless sign-in) email.
     Paste into Supabase → Authentication → Email Templates → "Magic Link".
     Supabase fills {{ .ConfirmationURL }} with the one-tap sign-in link. -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f7f2e9;padding:32px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1c1917;">
  <tr><td align="center">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#fffdf9;border:1px solid #e7ddcc;border-radius:16px;">
      <tr><td style="padding:28px 32px 0;">
        <div style="font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:700;">
          <span style="color:#bf502b;">Daily</span><span style="color:#1c1917;">OS</span>
        </div>
      </td></tr>
      <tr><td style="padding:18px 32px 4px;">
        <h1 style="font-family:Georgia,'Times New Roman',serif;font-size:24px;margin:0 0 10px;">Your sign-in link</h1>
        <p style="font-size:15px;line-height:1.55;color:#57534e;margin:0 0 22px;">
          Tap below to sign in to DailyOS &mdash; no password needed. This link works once and expires in 60&nbsp;minutes.
        </p>
        <table role="presentation" cellpadding="0" cellspacing="0"><tr>
          <td style="border-radius:10px;background:#bf502b;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 24px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;border-radius:10px;">Sign in to DailyOS</a>
          </td>
        </tr></table>
        <p style="font-size:13px;line-height:1.55;color:#78716c;margin:22px 0 0;">
          If you didn&rsquo;t try to sign in, you can safely ignore this email.
        </p>
      </td></tr>
      <tr><td style="padding:24px 32px;border-top:1px solid #e7ddcc;">
        <p style="font-size:12px;color:#a8a29e;margin:0;">DailyOS &middot; Life admin, handled.</p>
      </td></tr>
    </table>
  </td></tr>
</table>
