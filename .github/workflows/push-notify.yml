# Fires DailyOS push notifications ~every minute — for FREE.
#
# Vercel's Hobby (free) plan only runs a cron once per day, too slow for
# reminders. GitHub Actions is used instead. IMPORTANT: GitHub won't run a
# *schedule* more often than every 5 minutes (it throttles anything faster and
# skips runs under load). So to get true ~1-minute delivery, each run LOOPS
# internally — it pings the send endpoint once a minute for ~5 minutes — and we
# schedule it every 5 minutes so the pings are continuous. Every send is
# de-duped server-side, so pinging often never causes double notifications.
#
# COST NOTE: because each run stays alive ~5 minutes, this uses Actions minutes
# almost continuously. That's FREE on a public repo (unlimited Actions minutes).
# On a PRIVATE repo the free tier is ~2,000 minutes/month, which this exceeds —
# so if this repo is private, either make it public, or drop back to a plain
# every-5-min schedule (remove the loop), or point a free external 1-minute cron
# (e.g. cron-job.org) at /api/push/run instead.
#
# Setup (one time): in this repo → Settings → Secrets and variables → Actions,
# add a secret CRON_SECRET matching Vercel's CRON_SECRET (any long random text).
# If your site URL differs from the default below, add a repository *variable*
# SITE_URL with your deployed URL.

name: Push notifications

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 min; each run then pings each minute within
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

# Don't let runs pile up on top of each other.
concurrency:
  group: push-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Ping the send endpoint once a minute for ~5 minutes
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://daily-os-lac.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          for i in 1 2 3 4 5; do
            echo "ping $i/5 → $SITE_URL/api/push/run"
            curl -sS -m 50 -X GET \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$SITE_URL/api/push/run" || echo "ping $i failed (will retry next minute)"
            # Sleep a minute between pings, but not after the last one.
            if [ "$i" -lt 5 ]; then sleep 60; fi
          done
