# Fires DailyOS push notifications on a schedule — for FREE.
#
# Vercel's Hobby (free) plan only runs a cron once per day, which is too slow for
# reminders. GitHub Actions runs this every ~15 minutes at no cost and just pings
# our send endpoint, which scans for due reminders / upcoming events / expiring
# reward codes and pushes them. Every send is de-duped server-side, so pinging
# often never causes double notifications.
#
# Setup (one time):
#   1. In this repo: Settings → Secrets and variables → Actions → New repository
#      secret, name it CRON_SECRET, value = the same string you set for
#      CRON_SECRET in Vercel (any long random text). If you skip Vercel's
#      CRON_SECRET the endpoint is open and this still works — but setting both
#      is safer.
#   2. If your site URL isn't the one below, add a repository *variable*
#      SITE_URL with your deployed URL.

name: Push notifications

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 min (GitHub may delay under load)
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

# Don't pile up runs if one is slow.
concurrency:
  group: push-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DailyOS push scan
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://daily-os-lac.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Pinging $SITE_URL/api/push/run"
          curl -sS -m 60 -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/push/run"
